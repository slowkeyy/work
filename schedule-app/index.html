<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排班系統</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <h1>排班系統</h1>
    <nav class="tabs">
      <button class="tab active" data-tab="setup">設定</button>
      <button class="tab" data-tab="leave">休假輸入</button>
      <button class="tab" data-tab="schedule">排班</button>
      <button class="tab" data-tab="backup">備份</button>
    </nav>
  </header>

  <main class="container">
    <section id="tab-setup" class="tab-content active">
      <div class="grid">
        <div class="card">
          <div class="card-header">
            <h2>案場</h2>
            <button class="btn btn-primary" id="addSiteBtn">+ 新增案場</button>
          </div>
          <div id="siteList" class="list"></div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>員工</h2>
            <button class="btn btn-primary" id="addEmployeeBtn">+ 新增員工</button>
          </div>
          <div id="employeeList" class="list"></div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>機動人員</h2>
            <button class="btn btn-primary" id="addMobileBtn">+ 新增機動</button>
          </div>
          <div id="mobileList" class="list"></div>
        </div>
      </div>
    </section>

    <section id="tab-leave" class="tab-content">
      <div class="card">
        <div class="leave-toolbar">
          <div class="form-field" style="max-width:200px;">
            <label>選擇月份</label>
            <input type="month" id="leaveMonth">
          </div>
          <div id="leaveMonthInfo" class="hint" style="margin:0;"></div>
        </div>
      </div>
      <div class="leave-layout">
        <div class="card leave-sidebar-card">
          <h3 class="leave-sidebar-title">人員清單</h3>
          <div id="leaveSidebar" class="leave-sidebar"></div>
        </div>
        <div class="card leave-detail-card">
          <div id="leaveDetail" class="leave-detail"></div>
        </div>
      </div>
    </section>

    <section id="tab-schedule" class="tab-content">
      <div class="card">
        <div class="schedule-toolbar">
          <div class="form-field" style="max-width:200px;">
            <label>選擇月份</label>
            <input type="month" id="scheduleMonth">
          </div>
          <div class="schedule-actions">
            <button class="btn btn-primary" id="generateScheduleBtn">⚡ 產生班表</button>
            <button class="btn" id="exportScheduleBtn">⬇ 匯出 CSV</button>
            <button class="btn btn-danger btn-sm" id="clearScheduleBtn">清除班表</button>
          </div>
        </div>
        <div id="scheduleInfo" class="hint" style="margin-top:8px; margin-bottom:0;"></div>
      </div>
      <div id="scheduleIssues"></div>
      <div class="card schedule-matrix-card">
        <div id="scheduleMatrix" class="schedule-matrix-container"></div>
      </div>
    </section>

    <section id="tab-backup" class="tab-content">
      <div class="card">
        <h2>資料備份</h2>
        <p class="hint">資料儲存在瀏覽器中。建議定期匯出 JSON 備份，以防瀏覽器資料被清除或要換電腦使用。</p>
        <div class="btn-group">
          <button class="btn btn-primary" id="exportBtn">匯出 JSON 備份</button>
          <button class="btn" id="importBtn">匯入 JSON 備份</button>
          <input type="file" id="importFile" accept=".json" hidden>
          <button class="btn btn-danger" id="resetBtn">清空所有資料</button>
        </div>
        <div id="storageInfo" class="hint" style="margin-top:16px;"></div>
      </div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="leave.js"></script>
  <script src="schedule.js"></script>
  <script src="app.js"></script>
</body>
</html>
